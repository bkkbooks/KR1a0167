body:
  text: 易緯通卦驗卷下漢鄭康成注曰凡易八卦之氣驗應各如其法度則隂陽和六律調風雨時五榖成熟人民取昌此聖帝明王所以致太平法取昌衆富之言故設卦觀象以知有亡夫八卦繆亂則綱紀壊敗日月星辰失其行隂陽不和四時易政綱紀以喻数之大小謂如八卦主八卦是大也為之四氣則小八卦氣不效則災異炁臻八卦氣應失常臻至也八卦之氣不於時見於他是非其常故異多至夫八卦驗常在不亡以今八月八日不盡八日候諸卦炁各以用事時氣著明而見八月八日盡八日者月弦日也弦者隂氣得正而平此候氣在地屬隂故八日弦時用事者若乾立冬坎主冬至之謂也冬至四十五日以次周天三百六十五日復當卦之炁進則先時退則後時皆八卦之效也卦氣進則先時謂見其時之前乾炁見於冬至之分是也退即後時謂見於其時之後也夫卦之效也皆指時卦當應他卦氣及至其災各以其衝應之此天所以示告於人者也卦氣進則先時謂見其時之前乾炁見於冬至之分是也退即後時謂見於其時之後也案此註重出乾西北也主立冬人定白炁出直乾此正氣也氣出右萬物半死氣出左萬物傷立冬之左霜降之地右小雪之地霜物未徧收故其災物半死小雪則殺物矣故其災為傷乾氣不至則立夏有寒傷禾稼萬物多死人民疾疫應在其衝不至不見氣㣲不見而對受其災至疾疫乾氣重乾炁見於冬至之分則陽炁火盛當藏不藏蟄蟲冬行乾為君父為寒為冰為金為玉於是歲則立夏蚤蟄夏至寒乾得坎之蹇則夏雨雪水冰冬至之分大雪小寒之地分屬於坎乾氣見為四陽相得故為火盛當藏者蟄蟲冬行陽生出之夏夏至即災行矣為君為父言或有偶為金為玉寳物將用也立夏蚤蟄災發將竒乾炁退傷萬物謂見於秋分之分也坎北方也主冬至夜半黑炁出直坎此正炁也氣出右天下旱氣出左涌水出冬至右小寒之地大小雪二炁方凝其下難故旱小雪水方盛水行而出涌之象也坎炁不至則夏至大寒雨雪湧泉出歲多大水應在其衝亦寒不見對受其災坎炁見立春之分則水炁乗出坎為溝瀆於是歲多水災江河決山水涌出立春之分大寒驚蟄之地分屬於艮坎炁見焉是謂水炁乗出故歲多水災江河決溝瀆壊也坎炁退則天下旱謂見於立冬之分霜降小雪乾又為冰皆凝雨下難之象艮東北也主立春雞鳴黄炁出直艮此正炁也炁出右萬物霜炁出左山崩涌水出立春之右大寒之地左驚蟄之地也萬物之生而艮炁見於大寒之地故霜艮炁見於驚蟄之地山崩涌水則出也艮炁不至則立秋山陵多崩萬物華實不成五榖不入應在其衝㣲温㣲不見亦對受其災也矣華實之成本其生炁虚命然案此注疑有脫誤艮炁見於春分之分則萬物不成艮為山為止不止則炁過山崩春分之分雨水清明之地分屬於震艮炁見焉過而動是以崩也艮炁退則數有雲霧霜謂見於冬至之分坎為雲雲之出必由山艮炁退則雲不興雲霧霜者其轉散所為案艮炁退二句原本誤入注中今改正震東方也主春分日出青炁出直震此正炁也炁出右萬物半死炁出左蛟龍出春分之右雨水之地左清明之地物未可盡生故半死辰為龍震炁前故見蛟龍之類矣震炁不至則歲中少雷萬物不實人民疾熱應在其衝亦㣲温㣲不見對受其災也炁當見不見推而晚景炁如於秋分人則病案藝文類聚引作萬物華而不實震炁見立夏之分雷炁盛萬物䝉而死不實龍蛇數見不雲而雷冬至乃止立春之分穀雨小滿之地秀實當成之時推而加焉故令之不盈而死隂陽之常審者必待雲雷炁盈故獨行又過其節震炁退歲中少雷萬物不茂見立春之分萬物又過其節巽東南也主立夏食時青炁出直巽此正炁也炁出右風橛木炁出左萬物傷人民疾濕立夏之右榖雨之地左小滿之地榖雨之地有震跌躁之炁而巽炁見焉故風橛木風者摇養萬物今失其位為之風又乾物失位則不能戾之人則病巽炁不至則歲中多大風發屋揚砂禾稼盡應在其衝始暑萬物不見炁炁以對受其災巽炁見夏至之分則風炁過折木夏至之分芒種小暑巽炁退則盲風至萬物不成濕傷人民謂見於春分之地盲風者應八節而至也離南方也主夏至日中赤炁出直離此正炁也炁出右萬物半死炁出左赤地千里夏至之右芒種之地左小暑之地芒種之時可稼澤地離者熯物而見於芒種之地則澤稼獨生陵陸死矣赤地千里言旱甚且廣千里穿井井乃得泉離炁不至則無日光五榖不榮人民病目痛冬無冰應在其衝暑㣲不見亦對受其災也離為日月目痛離炁失故也榮光明類離炁見於立秋之分大暑處暑之地離為戈兵失炁故兵起也案離炁見於立秋之分句下疑有脫文離炁退則其歲日無光隂必害之謂見於立夏之分也隂必害之有薄食者案大暑處暑之地三句原本誤作正文離炁三句原本誤作注文謂見於立夏之分也三句原本誤作正文今悉改正坤西南也主立秋晡時黄炁出直坤此正炁也炁出右萬物半死炁出左地動立秋之右大暑之地左處暑之地也坤為地地主養物而炁見大暑之地旱故物半死地炁失位則地動也坤炁不至則萬物不茂地數震牛羊多死應在其衝始陳㣲見亦對受其災也地為牛為羊案注始陳㣲見句疑有誤字坤炁見於秋分之分則其歲地動摇江河水乍存乍亡秋分之分白露寒露之地此災物其道靜坤炁失位故動摇見於秋之得兊毁折附决之炁故小大之水或存或亡坤炁退則地分裂水泉不泯謂見於夏至之分夏者離主為日日中之晷先王以土地建邦國坤炁失位而見焉故為地分裂之異地分裂水放逸勢自然也案坤氣退三句原本誤入注中今改正兌西方也主秋分日白炁出直兌此正炁也炁出右萬物不生炁出左則虎害人秋分之右白露之地左寒露之地兊主八月其所生唯薺與麥白露始殺故使萬物不生寒露殺炁浸盛兌失位虎則為害案日白炁出直兌句疑有脫字兑炁不至則嵗中多霜草木枯落人民疥瘙應在其衝凉㣲不見亦對受其災也霜炁加於枝葉故人為疥瘙也兌炁見於立冬之分則萬物不成虎狼為災在澤中立冬之分霜降小雪之地虎狼毛蟲屬金兌炁退則澤枯萬物不成謂見於主秋之分兊能失位而見於坤坤為地故於澤則枯也春三月侯卦炁比不至則日食無光君失政臣有謀期在其衝上既著八卦炁之得失此又重以消息之候所以詳易道天炁春三月候卦炁者泰也大壯也夬也皆九三上六實炁决温不至者君不明之徴也故日為之變白炁應之期百日二旬期本在衝白炁應之金沴木則更位臣有誅者則各降在内謀者姦也覺故誅謀已天各降之夏三月候卦炁比不至則大風折木發屋期百日二旬地動應之大風期在其衝夏三月候卦炁者乾也姤也遯也皆九三上九實炁㣲赤炁應之有兵期三百二十日此冬三月卦也各以其衝為兵期案此文疑有訛誤春三月一卦不至則秋蚤霜二卦不至則雷不發蟄三卦不至則三公有憂在八月夏三月一卦不至則秋草木早死二卦不至則冬無冰人民病三卦不至則臣内殺三公有縗絰之服崩以三月為期秋三月一卦不至則中臣有用事者春下霜二卦不至則霜著木在二月三卦不至則臣專政草木春落臣有免者則已冬三月一卦不至則夏雨雪二卦不至則水三卦不至則湧水出人君之政所致之故各以其卦用事候之甲日見者青乙日見者青白丙日見者赤丁日見者赤黑戊日見者黄已日見者青黄庚日見者白辛日見者赤白壬日見者黒癸日見者黄黑各以其炁候之其雲不應以其事占吉凶假令坎炁不至艮而見坎乗艮山上有水之象也其用事時日甲八也其卦事坎乗艮其比類也是章之事與上相依象似寫者得異家并存于此耳又卦炁各有色不用甲八亦進於平錯也餘下皆放之次類也案冬三月一卦不至五句應在秋三月臣有免者則已之下原本錯簡在下隂應上陽一節之後今改正不順天地君臣職廢則乾坤應變天為不放地為不化終而不改則地動而五榖傷死上及君位不敬宗廟社稷則震巽應變飄風發屋折木水浮梁雷電殺人此或出人暴應之也不改不改補脫誤耳當承此或下也入山澤不順時卦失山澤之禮則艮不應變期雲不出則山崩恩澤不下災則澤涸物枯槁不生不順時卦卦誤字也當為炁耳夫婦無别大臣不良則四時易政令不行白黑不别愚智同位則日月無光精見五色此離坎之應也皆八卦變之效也故曰八卦變象皆在于己巳人君也上列八卦炁之非常而為交異而著温而不至者若敎令失中之徴也故風為之變期木百二十日君教令失中甚則臣欲叛致地動重於大風故有地動則其處察舒之案此注疑有錯誤多死臣黑炁應之黑炁應之水沴火也凡炁黑者為臣死者君無輔之咎也矣秋三月候卦炁比不至則君私外家中不慎刑臣不盡職大旱而荒期在其衝秋三月候卦炁者否也觀也剝也皆六三上九實炁决寒而不至當君倒賞之徴君之賞宜先逺今私外家是其倒也臣不盡力於其職私外家使之然大旱時有賞賜也荒虚也歳不熟曰荒青炁應之期百日二旬期本在衝水沴之則更位冬三月候卦炁比不至則赤炁應之期在百二十日内有兵日食之災期三百六旬也冬三月候卦炁者坤也復也臨也皆六三上六實炁㣲寒而不至者君政恭緩之徴也而火沴之百三十日内有兵臣下欲試之兵也聞有日食則君災兵逺故期更逺也三公有免者期在其衝則已無兵日食之後卦炁不至之徴大臣之謀覺之故即以無兵免故咎除無兵欲求其日期隂與隂相應不三之三六十八百八十陽與陽相應災異之期爻得正陽為九隂為六失正陽為七隂為八得正者則期促失正者則期遲故上六者三六上九者也下隂應上陽七其陽八其隂以為日數下陽應上隂九其陽六其隂此一陽一隂期其變於純隂之數異術也其異術也七其陽八其隂九其陽六其隂此則各自乗并之以為日數案夏三月候卦炁比不至以下數節疑有錯簡春三月一卦不至一節鄭注謂似冩者得異家并存於此今以前後文義核之似不順天地以下三節亦統論卦變之效其文或在冬三月下也冬至廣莫風至蘭射干生麋角觧曷旦不鳴四者羣物炁至之應也晷長丈三尺隂炁去陽雲出其莖末如樹木之狀二者天炁應政之徴也晷者所立八尺之表長丈三尺長之極後有減矣陽始也起故隂炁去於天不復見而陽雲出箕焉二十四炁冬至芒種為陽其位在天漢之南夏至大雪為隂其位在天漢之北術候陽雲於陽位而以夜候隂雲於隂位而以晝夜則司之於星晝則視於其位而以其率爾雲之形貌亦如說卦之後象也冬至坎始用事而主六炁初六巽爻也巽為木如樹木之狀巽象案古㣲書作冬至陽雲出箕如樹木之状注亦作陽雲出箕其字應作箕凡此隂陽之雲天之雲天之便炁也坎震離兌為之每卦六爻既通於四時二十四炁人之四支二十四脉亦存於期形猶不從五行之状故其當至不至則萬物大旱大豆不為人足太隂脉虚多病振寒萬物蔵炁大旱隂不足也未當至而至則人足太隂脉盛多病暴逆臚張心痛大旱應在夏至衝受也災期在齊案衝受句疑衍小寒合凍虎始交祭虵垂首曷旦入空晷長丈二尺四分倉陽雲出平南倉北黑二者亦天應政之徵也晷減於冬至九寸二分者率也小寒於坎直九二九二得寅炁木也為南倉從坎也為北黒宿次當為出尾而言平似誤者也案禮記月令孔穎逹疏引作小寒虎始交豺祭獸此本疑脫豺獸二字又後漢書注小寒晷長一大一尺四分古㣲書作倉陽雲出氐俱與此文異當至不至則先小旱後小水人手太隂脉虚一作靈人多病喉痺隂炁不生故小旱後則并小水坎九二陽爻也為午炁不至故令脉虚喉脾字誤也當為喉痺時方隂隂閉塞人炁通人之炁炁通者喉喉病為痺手太隂脉起手大指内側上貫呪唾散鼻中未當至而至則人手太隂脉盛人多熱來年麻不為寒炁失而轉生熱病多熱麻以皮為用孚甲之類蔵失必傷故禁種案前後節炁此處疑脫應在小暑句注亦脫災在周泰句大寒雪降草木多生心鵲始巢三者羣物應炁至之候隂盛也多生心陽炁起也晷長丈一尺八分黑陽雲出心南黑北黄大寒於坎直六三六三得亥炁水也為南黒季冬土也為北黄當至不至則旱後水麥不成人足少隂脉虚多病蹶逆惕善驚小寒炁不至為小旱小水大寒不至有加勢也稼合養於炁炁失即傷矣坎六三隂爻也屬足不至故令人脉虚虚則足煩炁逆本舌為病此三平在震中震為驚恐也足少隂脉起於足上繫未當至而至則人足少隂脉盛人多病上炁嗌腫嗌者水榖所由通今初未當來而來上炁嗌嗌腫受其病以少隂盛也應在大暑災期在周立春雨水降條風至雉雊雞乳冰觧楊栁椲降下也雊鳴相呼也栁青楊色也椲讀如柘楊梯狀如女桑秀然也晷長丈一尺二分青陽雲出房如積水立春於坎直六四六四巽爻得木炁之雲如積水似誤案後漢書律歴志注作晷長一丈一寸六分當至不至則兵起來年麥不成人足少陽脉虚多病疫瘧立春木始王炁不至兵起者金沴之也大旱似多雷麥立春麥也春不至者陽炁出當小雨以釋之炁失故麥不成來年羡字坎六四隂爻也屬足也炁不足故令足脉虚立春不至者寒得其節也疫瘧寒赤病此當與火同為足少隂脉言陽非案後漢書注作兵起麥不成民瘦瘵與此文異未當至而至則人足少陽脉盛人多病粟疾疫粟痤腫也春炁早成麥盛而結生此病焉王炁早隂則傷之人疾疫者受其害也脉亦當為足少隂矣應在立秋災期在道案軒轅十二次自張十八度至軫十一度曰鶉尾之次立秋節斗建在申今楚分野禮記月令注髙氏誘曰孟秋之月日在翼翼南方宿楚之分野則此處宜作楚道字乃傳寫之訛也雨水凍冰釋猛風至獺祭魚鶬鷃鳴蝙蝠出猛風動摇樹木有聲倉庚鳴伏地蝙蝠服翼案馬氏繹史引作獺祭魚倉庚鳴晷長九尺一寸六分黄陽雲出亢南黄北黑雨水於坎直九五九五辰在申得坤炁為南黄猶坎也故北黑案晷長九尺一寸六分三句原本誤入註中今改正當至不至則旱麥不為人手少陽脉虚人多病心痛雨水炁不至則轉為旱旱故禁種春坎九五陽爻於脉宜為手太陽云少陽似誤心痛坎也手太陽脉起為手小指端上頥下目内皆雨水以後為陽脉者未當至而至則人手少陽脉盛人多病目雨水木炁也其盛為肝肝候在目木炁於目則勞勞故病言脉亦當為於太陽也應在處暑災期在魏驚蟄雷候應北雷者電之光雷有光而未發聲案古㣲書作驚蟄大壮初九桃始華不華倉庫多火與此文異晷長八尺二寸赤陽雲出翼南赤北白驚蟄於坎直上六上六得已炁已火也為南赤又得巽炁故北白也當至不至則霧稚禾不為人足太陽脉虚人多疫病瘧驚蟄炁不至是餘寒乘之也後則推晷炁命稚禾之熟在八月其時蟄蟲則有害故禁種之爾坎上六隂爻屬足炁不至故命之脉虚寒炁乗病瘧寒也上六得巽之炁為白又為寡髪而自是老人也太陽脉起足小指端至前兩板齒案後漢書注作稚禾不成老人多病噎未當至而至則人足太隂脉盛多病癰疽脛腫雷炁蚤至動人肌膚病癰疽者肌膚不堪也氣結生病也足太陽脉起於下其炁盛合脛腫應在白露災期在災案病癰疽者四句原本誤入正文應在白露句原本誤作小注今改正又災期在災災字誤考軒轅十二次自軫十二度至氐四度謂之夀星之次白露節斗建在酉今韓鄭分野禮記月令注髙氏誘曰仲秋之月日在角角東方宿鄭之分野則此處疑當作鄭春分明庶風至雷雨行桃始花日月同道明庶照逹庶物之風雷雨所以觧釋孚甲日月一分則同道也案藝文類聚引作雷雨行桃李華太平御覽引作春分明庶風至正封疆修田疇與此文異晷長七尺二寸四分正陽雲出張如積鵠春分於震直初九初九辰在子震爻也如積鵠之象案杜公瞻編珠引作春分雲如白鵠古㣲書引作正陽雲出如積白鵠此本疑脫白字當至不至先旱後水歲惡重來不為人手太陽脉虚人多病痺痛未當至而至人手太陽脉盛人多病癘疥身癢應在秋分災期周秦案後漢書注作先旱後水歲惡米不成多病耳痒重來二字恐誤清明雷鳴雨下清明風至元鳥來清明萬物雜新觧孚甲合之鮮觧清明明清潔之風也元鳥隨炁和乃至案注文疑有訛誤晷長六尺二寸八分白陽雲出南白北黄清明震直六二六二震在酉得兌炁為南白互體有艮故北黄也當至不至菽豆不為人足陽明脉虚人多病疥虚振寒洞泄震於稼為反生豆菽之類案後漢書注作多病􅅉振寒洞泄未當至而至人足陽明脉盛人多病温暴死應在寒露災在宋也案前後節炁此句宜應在寒露白露恐誤今改正榖雨田鼠化為鴽鴽麋母也晷長五尺三寸二分太陽雲出張上如車盖不如薄榖雨於震直六三六三辰在辰得乾炁形似車盖震為萑葦故不如薄也案後漢書注引作榖雨晷長五尺三寸六分杜公瞻編珠作穀雨雲如連盖與此文異當至不至水物稻等不為人足陽明脉虚人多病癰疽瘧振寒霍亂六三兊爻也互體坎炁不至故水澤之物不為癰疽瘧振寒霍亂亦姤兊之病未當至而至人足陽明脉盛人多病温黒腫凡陽以養少隂以養老應在霜降災期在宋立夏清明風至而暑鵠聲蜚電見早出龍升天清明風景清潔之風鵠鳴聲蜚皆鳥獸應時候龍心星也詩云綢繆東薪三星在天亦謂此時也案徐堅初學記引作立夏清風至而暑鵲鳴聲博榖飛電見龍升天太平御覽引作立夏清明風至出幣帛禮諸侯與此文異晷長四尺三寸六分當陽雲出觜紫赤如珠立春於震九四九四辰在午也午為火互體坎炁相亂也故紫赤色皆如珠也當至不至則旱五榖大傷牛畜病人手陽明脉虚多病寒熱齒龋盛陽之炁不至則後為旱陽氣乗之故五榖大傷也四互體艮艮在丑故牛畜病也陽炁不至其衝更温故人病寒熱也齒龋者陽生龋於時為害也未當至而至人手陽明脉盛多病頭腫嗌喉痺應在立冬災期在燕小滿雀子蜚螻蛄鳴於此更言雀子蜚者鳴鳥類也有先大人之案此注疑有脫文晷長三尺四寸上陽霍七星赤而饒小滿於震直六五六五辰在邜與震木同位震木可曲可直五六離爻亦有互體坎之為輪也饒言其刑行四也案古㣲書小滿上陽雲出七星霍字疑誤注文末句亦誤當至不至多凶言有大喪先水後旱人足太陽脉虚人多病滿筋急痺痛小滿太陽用事其炁不至故多凶言大喪也隂炁不退乘陽炁故先水也精陽發則旱也人病筋急寒暴暑炁轉相加案後漢書注作多病筋急庳痛滿字疑誤未當至而至人足太陽脉盛人多病衝炁腫太陽炁早至過度為病也案此處疑脫應在小雪句注亦脫災期在燕句芒種蚯蚓出舊說蚯蚓淫邪晷長二尺四分長陽雲集赤如曼曼芒種於震直上六上六辰在已又得巽炁故集赤不純巽又長故曼之也案後漢書注作晷長二尺四寸四分此本缺四寸二字當至不至多凶言國有狂令人足太陽脉虚多病血痺太陽用事而巽不至故多凶言國有狂令也痺者炁不逹為病未當至而至人足太陽脉盛多蹶眩頭痛痺太陽之炁也過盛病也案後漢書注頭痛下無庳字疑衍文應在大雪災期在齊案軒轅十二次自斗十一度至湏女七度日星紀之次大雪節斗建在子今吴越分野齊字恐悮夏至景風至暑且濕蟬鳴螳螂生鹿觧角木莖榮景風長大萬物之風也蟬蜩木莖栁櫬榮華案太平御覽引作夏至景風至拜大將封有功與此文異注文亦有訛字晷長四寸八分少隂雲出如水波崇崇夏至離用事位直初九辰子也故水波崇崇㣲輪轉出也案後漢書注夏至晷長一尺四寸八分此文缺一尺二字當至不至邦有大殃隂陽並傷口乾嗌痛陽炁泄極而㣲隂不至陽功不成故國有大殃臣廢隂陽並傷日月俱食夏至炁不至則衝炁乗之故多大寒令草木夏落也口乾嗌痛皆􅏫病隂不潤陽謂之􅏫也案後漢書注當至不至國有大殃旱隂陽並傷草木夏落有大寒今據鄭注合之此文脫誤多矣又疑脫人手陽脉虚句未當至而至人手陽脉盛多病肩痛隂炁過多以為病也應在冬至災期在齊小暑雲五色出伯勞鳴蝦蟇無聲雲五色出盖衆雉伯勞咀也蝦蟇無聲早出者不復鳴案禮記月令孔頴達疏引此文作博勞鳴蝦蟇無聲歐陽詢藝文類聚引此文又有博勞性好單按其飛􅭙其聲嗅嗅夏至應隂而鳴冬至而止五句疑為注文藝文類聚誤連而今本亦有脫誤也晷長二尺四寸四分黑隂雲出南黄北黒小暑於離直六二六二離爻也為南黄互體巽巽為故北黒也案此注巽為下有脱字當至不至前小水後小旱有兵人足陽明脉虚多病泄注腹痛離炁不至故小水後小旱有少兵兵無少者泄注腹痛皆離炁不至之病也未當至而至人足陽明脉盛多病臚腫離炁早至則後多傷性也應在小寒災期在齊案此處宜應在小寒小雪誤今改正大暑雨濕半夏生半夏草名晷長三尺四寸隂雲出南赤北倉大暑於離直九三九三辰在辰得巽炁離為火故南赤巽木故北倉案杜公瞻編珠引作大暑雲出南黄北倉當至不至外兵作來年飢人手少陽脉虚多病筋痺胸痛大暑之炁不至後亦寒暴害九三互體兊上直畢畢為故外兵作也兊又為剛鹵當國不生物大暑應在大寒容地之萌故來年飢筋痺暑濕之疾盛暑濕而炁不至於人主筋痺之病也案注畢為下有脫字容地句亦疑誤未當至而至人手少陽脉盛多病脛痛惡炁隂炁早至亦為此病應在大寒災期在燕立秋凉風至白露下虎嘯腐草為嗌蜻蚓鳴凉風風有寒炁白露露得寒炁始轉白虎嘯始盛秋炁有猛意舊說腐草為鳴今言嗌其物異名乎蜻蚓蟋蟀之名也案太平御覽引作立秋凉風至報土功祀四鄰又文選李善注引作立秋蜻蛚鳴蚓字應作蛚晷長四尺三寸六分濁隂雲出上如赤繒列下黄弊立秋於離直九四辰在午又互體巽故上如赤繒列齊平也立秋直坤黄色故名黄弊也案弊字疑作幣當至不至暴風為災年歲不入人足少陽脉虚多病癘少陽炁中寒白芒芒立秋之炁不至後亦暴風為災也四互體巽巽為風災也風有散物故年不入也立秋應立春孚甲将觧而更寒故人病癘隂乗陽故少陽炁中寒也白芒芒者離以非時見也人足者例宜言手未當至而至人足少陽脉盛多病咳𠻳上炁咽喉腫立秋則隂炁脇陽炁未服故咳𠻳咽喉腫也應在立春災期亦在衛也處暑雨水寒蟬鳴雨水多雨寒蟬秋蟬晷長五尺三寸二分赤隂雲出南黄北黑處暑於離直六五六五辰在夘得震炁震為故南黄也案初學記作南黄北蒼注震為下亦有脫字當至不至國有淫令四方兵起人手太隂脉虚多病脹身熱來年麥不為未當至而至人手太隂脉盛多病脹身熱不汗出隂炁早至即寒炁盛故病脹身熱不汗案後漢書注當至不至國多浮令兵起來年麥不熟此文疑倒置應在雨水災期在鄭白露雲炁五色蜻蛚上堂鷹祭鳥燕子去室鳥雌雄别燕子去室不復在於巢習飛騰也鳥雌雄别生乳之炁上者晷長六尺二寸八分黄隂雲出南黑北黄白露於離直上九上九艮爻也故北黄辰在戌得乾炁君成故南黑也案小注君成二字疑誤當至不至六畜多傷人足太隂脉虚人多病痤疽泄白露應在驚蟄陽炁大泄萬物新出而寒傷之故座疽也陽炁發泄故也故泄之未當至而至人足太隂脉盛多病心脹閉痔瘕陽炁未盡強隂脇之為病人足於例亦為手也應在驚蟄災在魯也秋分風凉惨雷始収鷙鳥擊元鳥歸昌盍風至収藏也鷙鳥鷹鸇之属也元鳥隨陽故南歸也昌盍盖藏物之風也案太平御覽引作秋分閶闔風至觧懸垂琴瑟不張與此文異晷長七尺二寸四分白雲出南黄北白秋分於兊直初九初九震爻為南黄黄猶兊故北白案古㣲書白陽雲作白隂雲當至不至草木復榮人手少陽脉虚多病温悲心痛未當至而至人手少陽脉盛多病􅽫脇鬲痛心炁盛故􅽫脇鬲痛應在春分災期在周寒露霜小下秋草死衆鳥去霜小下隂㣲著也秋草死衆鳥暑來寒去晷長八尺二寸正陽雲出如冠纓寒露於兊直九二九二辰在寅得艮炁形似冠纓者艮象也案古㣲書作正隂雲出如冠纓鄭注亦作冠纓正文脫纓字今補入當至不至來年榖不成六畜鳥獸被殃人足蹶隂脉虚多病疪疼腰痛九二坎爻也為脊炁不至疪疼也人足於例宜為手也案後漢書注作人病疝瘕腰痛不當至而至人足蹶隂脉盛多病痛􅽫中熱強隂脇衰故多病􅽫中熱也案後漢書注作多病痰熱中應在清明災在秦也霜降候雁南向豺祭獸霜大下草未死候雁南向陽炁盡之候也豺将食獸必先祭也草禾或為草木晷長九尺一寸六分太陽雲出上如羊下如磻石霜降於兊直六三六三兊爻為羊又上直礪石之星故上如羊下如磻石案初學記作太隂雲出當至不至萬物大耗來年多大風人足蹶隂脉虚多病腰痛霜降炁不至則陽炁不伏當死更生故令物虚耗六又互體巽則暴發來年即為大風也又撓屈萬物故令人患其腰痛也未當至而至人足蹶隂脉盛多病喉風腫隂炁早至而脇陽也又互體離離巽火得風腫案後漢書注作多病胃脇支滿應在榖雨災期在趙立冬不周風至始冰薺麥生賔爵入水為蛤立冬應用事陽炁生異故不周風至周達萬物之不及時者時草死盡惟薺麥生耳賔爵入水為蛤亦物應時之變候晷長丈一寸二分隂雲出接立冬於兊直九四九四辰在午火性炎上故接案太平御覽引作立冬不周風至修宫室完邉城八風以時則隂陽正治道成萬物得以育生與此文異當至不至地炁不藏立夏反寒早旱晚水萬物不成人手少陽脉虚多病温心煩未當至而至人手少陽脉盛多病臂掌痛隂脉在内故炁早至為病令人掌及臂痛也應在立夏災期在魏小雪隂寒熊羆入穴雉入水為蜃雉入水亦為蜃蛤晷長丈一尺八分隂雲出而黑小雪於兊在九五九五兊爻得坎炁故黒當至不至來年五榖傷蠶麥不為人心主脉虚多病肘腋痛未當至而至人心主脉盛人多病腹耳痛九五坎爻故耳病也辰在申炁得故腹痛案此注疑有脫誤應在小滿災期在魯大雪魚負冰雨雪負冰上近冰也雨雪者明不復雨水晷長丈二尺四分長雲出黑如介大雪於兊直上六上六辰在已得巽炁為長始分或如介未聞案古㣲書作隂雲出而分當至不至温炁泄夏蝗生大水人手心主脉虚多病少炁五疸水腫未當至而至人手心主脉盛多病癰疽腫痛盛陽之炁早至結則為癰疽冬萬物孚甲炁早至故多疽而痛應在芒種災期在衛聖人仰取象於天俯取法於地以知隂陽精㣲所應精㣲晷及雲炁也應者應人君政之進退故日者衆陽之精也天所以照四方因以立定二十四炁始於冬至終於大雪周天三百六十五日分之一隂一陽分之各得八十二日有竒分為普得九十一日有竒四正分而成八節節四十五日二十一分八節各三分各得十五日七分而為一炁也分滿三十二為一日令備或為復言隂陽四時八節二十四炁各如其分之日數令備為一嵗備足也復備同義說者以為疑字耳言備或為復人自以為法度焉二十四炁其復合於晷應其法皆先復之二日左同右
