body:
  text: 易緯通卦驗卷下漢鄭康成注曰凡易八卦之氣驗應各如其法度則隂陽和六律調風雨時五榖成熟人民取昌此聖帝明王所以致太平法取昌衆富之言故設卦觀象以知有亡夫八卦繆亂則綱紀壞敗日月星辰失其行隂陽不和四時易政綱紀以喻數之大小謂如八卦主八卦是大也為之四氣則小八卦氣不效則災異氣臻八卦氣應失常臻至也八卦之氣不於時見於他是非其常故異多至夫八卦驗常在不亡以今八月八日不盡八日候諸卦氣各以用事時氣著明而見八月八日盡八日者月弦日也弦者隂氣得正而平此候氣在地屬隂故八日弦時用事者若乾立冬坎主冬至之謂也冬至四十五日以次周天三百六十五日復當卦之氣進則先時退則後時皆八卦之效也卦氣進則先時謂見其時之前乾氣見於冬至之分是也退即後時謂見於其時之後也夫卦之效也皆指時卦當應他卦氣及至其災各以其衝應之此天所以示告於人者也卦氣進則先時謂見其時之前乾氣見於冬至之分是也退即後時謂見於其時之後也案此注重出乾西北也主立冬人定白氣出直乾此正氣也氣出右萬物半死氣出左萬物傷立冬之左霜降之地右小雪之地霜物未遍收故其災物半死小雪則殺物矣故其災為傷乾氣不至則立夏有寒傷禾稼萬物多死人民疾疫應在其衝不至不見氣微不見而對受其災至疾疫乾氣重乾氣見於冬至之分則陽氣火盛當藏不藏蟄蟲冬行乾為君父為寒為冰為金為玉於是歲則立夏蚤蟄夏至寒乾得坎之蹇則夏雨雪水冰冬至之分大雪小寒之地分屬於坎乾氣見為四陽相得故為火盛當藏者蟄蟲冬行陽生出之夏夏至即災行矣為君為父言或有偶為金為玉寶物將用也立夏蚤蟄災發將竒乾氣退傷萬物謂見於秋分之分也坎北方也主冬至夜半黑氣出直坎此正氣也氣出右天下旱氣出左涌水出冬至右小寒之地大小雪二氣方凝其下難故旱小雪水方盛水行而出涌之象也坎氣不至則夏至大寒雨雪湧泉出歲多大水應在其衝亦寒不見對受其災坎氣見立春之分則水氣乘出坎為溝瀆於是歲多水災江河決山水涌出立春之分大寒驚蟄之地分屬於艮坎氣見焉是謂水氣乘出故歲多水災江河決溝瀆壞也坎氣退則天下旱謂見於立冬之分霜降小雪乾又為冰皆凝雨下難之象艮東北也主立春雞鳴黃氣出直艮此正氣也氣出右萬物霜氣出左山崩涌水出立春之右大寒之地左驚蟄之地也萬物之生而艮氣見於大寒之地故霜艮氣見於驚蟄之地山崩涌水則出也艮氣不至則立秋山陵多崩萬物華實不成五榖不入應在其衝微溫微不見亦對受其災也矣華實之成本其生氣虛命然案此注疑有脫誤艮氣見於春分之分則萬物不成艮為山為止不止則氣過山崩春分之分雨水清明之地分屬於震艮氣見焉過而動是以崩也艮氣退則數有雲霧霜謂見於冬至之分坎為雲雲之出必由山艮氣退則雲不興雲霧霜者其轉散所為案艮氣退二句原本誤入注中今改正震東方也主春分日出青氣出直震此正氣也氣出右萬物半死氣出左蛟龍出春分之右雨水之地左清明之地物未可盡生故半死辰為龍震氣前故見蛟龍之類矣震氣不至則歲中少雷萬物不實人民疾熱應在其衝亦微溫微不見對受其災也氣當見不見推而晚景氣如於秋分人則病案藝文類聚引作萬物華而不實震氣見立夏之分雷氣盛萬物蒙而死不實龍蛇數見不雲而雷冬至乃止立春之分穀雨小滿之地秀實當成之時推而加焉故令之不盈而死隂陽之常審者必待雲雷氣盈故獨行又過其節震氣退歲中少雷萬物不茂見立春之分萬物又過其節巽東南也主立夏食時青氣出直巽此正氣也氣出右風橛木氣出左萬物傷人民疾濕立夏之右榖雨之地左小滿之地榖雨之地有震跌躁之氣而巽氣見焉故風橛木風者搖養萬物今失其位為之風又乾物失位則不能戾之人則病巽氣不至則歲中多大風發屋揚砂禾稼盡應在其衝始暑萬物不見氣氣以對受其災巽氣見夏至之分則風氣過折木夏至之分芒種小暑巽氣退則盲風至萬物不成濕傷人民謂見於春分之地盲風者應八節而至也離南方也主夏至日中赤氣出直離此正氣也氣出右萬物半死氣出左赤地千里夏至之右芒種之地左小暑之地芒種之時可稼澤地離者熯物而見於芒種之地則澤稼獨生陵陸死矣赤地千里言旱甚且廣千里穿井井乃得泉離氣不至則無日光五榖不榮人民病目痛冬無冰應在其衝暑微不見亦對受其災也離為日月目痛離氣失故也榮光明類離氣見於立秋之分大暑處暑之地離為戈兵失氣故兵起也案離氣見於立秋之分句下疑有脫文離氣退則其歲日無光隂必害之謂見於立夏之分也隂必害之有薄食者案大暑處暑之地三句原本誤作正文離氣三句原本誤作注文謂見於立夏之分也三句原本誤作正文今悉改正坤西南也主立秋晡時黃氣出直坤此正氣也氣出右萬物半死氣出左地動立秋之右大暑之地左處暑之地也坤為地地主養物而氣見大暑之地旱故物半死地氣失位則地動也坤氣不至則萬物不茂地數震牛羊多死應在其衝始陳微見亦對受其災也地為牛為羊案注始陳微見句疑有誤字坤氣見於秋分之分則其歲地動搖江河水乍存乍亡秋分之分白露寒露之地此災物其道靜坤氣失位故動搖見於秋之得兊毁折附決之氣故小大之水或存或亡坤氣退則地分裂水泉不泯謂見於夏至之分夏者離主為日日中之晷先王以土地建邦國坤氣失位而見焉故為地分裂之異地分裂水放逸勢自然也案坤氣退三句原本誤入注中今改正兌西方也主秋分日白氣出直兌此正氣也氣出右萬物不生氣出左則虎害人秋分之右白露之地左寒露之地兊主八月其所生唯薺與麥白露始殺故使萬物不生寒露殺氣浸盛兌失位虎則為害案日白氣出直兌句疑有脫字兑氣不至則嵗中多霜草木枯落人民疥瘙應在其衝涼微不見亦對受其災也霜氣加於枝葉故人為疥瘙也兌氣見於立冬之分則萬物不成虎狼為災在澤中立冬之分霜降小雪之地虎狼毛蟲屬金兌氣退則澤枯萬物不成謂見於主秋之分兊能失位而見於坤坤為地故於澤則枯也春三月侯卦氣比不至則日食無光君失政臣有謀期在其衝上既著八卦氣之得失此又重以消息之候所以詳易道天氣春三月候卦氣者泰也大壯也夬也皆九三上六實氣決溫不至者君不明之徴也故日為之變白氣應之期百日二旬期本在衝白氣應之金沴木則更位臣有誅者則各降在內謀者姦也覺故誅謀已天各降之夏三月候卦氣比不至則大風折木發屋期百日二旬地動應之大風期在其衝夏三月候卦氣者乾也姤也遁也皆九三上九實氣微赤氣應之有兵期三百二十日此冬三月卦也各以其衝為兵期案此文疑有訛誤春三月一卦不至則秋蚤霜二卦不至則雷不發蟄三卦不至則三公有憂在八月夏三月一卦不至則秋草木早死二卦不至則冬無冰人民病三卦不至則臣內殺三公有縗絰之服崩以三月為期秋三月一卦不至則中臣有用事者春下霜二卦不至則霜著木在二月三卦不至則臣專政草木春落臣有免者則已冬三月一卦不至則夏雨雪二卦不至則水三卦不至則湧水出人君之政所致之故各以其卦用事候之甲日見者青乙日見者青白丙日見者赤丁日見者赤黑戊日見者黃已日見者青黃庚日見者白辛日見者赤白壬日見者黑癸日見者黃黑各以其氣候之其雲不應以其事占吉凶假令坎氣不至艮而見坎乘艮山上有水之象也其用事時日甲八也其卦事坎乘艮其比類也是章之事與上相依象似寫者得異家并存于此耳又卦氣各有色不用甲八亦進於平錯也餘下皆放之次類也案冬三月一卦不至五句應在秋三月臣有免者則已之下原本錯簡在下隂應上陽一節之後今改正不順天地君臣職廢則乾坤應變天為不放地為不化終而不改則地動而五榖傷死上及君位不敬宗廟社稷則震巽應變飄風發屋折木水浮梁雷電殺人此或出人暴應之也不改不改補脫誤耳當承此或下也入山澤不順時卦失山澤之禮則艮不應變期雲不出則山崩恩澤不下災則澤涸物枯稿不生不順時卦卦誤字也當為氣耳夫婦無别大臣不良則四時易政令不行白黑不别愚智同位則日月無光精見五色此離坎之應也皆八卦變之效也故曰八卦變象皆在于己巳人君也上列八卦氣之非常而為交異而著溫而不至者若教令失中之徴也故風為之變期木百二十日君教令失中甚則臣欲叛致地動重於大風故有地動則其處察舒之案此注疑有錯誤多死臣黑氣應之黑氣應之水沴火也凡氣黑者為臣死者君無輔之咎也矣秋三月候卦氣比不至則君私外家中不慎刑臣不盡職大旱而荒期在其衝秋三月候卦氣者否也觀也剝也皆六三上九實氣決寒而不至當君倒賞之徴君之賞宜先逺今私外家是其倒也臣不盡力於其職私外家使之然大旱時有賞賜也荒虛也歲不熟曰荒青氣應之期百日二旬期本在衝水沴之則更位冬三月候卦氣比不至則赤氣應之期在百二十日內有兵日食之災期三百六旬也冬三月候卦氣者坤也復也臨也皆六三上六實氣微寒而不至者君政恭緩之徴也而火沴之百三十日內有兵臣下欲試之兵也聞有日食則君災兵逺故期更逺也三公有免者期在其衝則已無兵日食之後卦氣不至之徴大臣之謀覺之故即以無兵免故咎除無兵欲求其日期隂與隂相應不三之三六十八百八十陽與陽相應災異之期爻得正陽為九隂為六失正陽為七隂為八得正者則期促失正者則期遲故上六者三六上九者也下隂應上陽七其陽八其隂以為日數下陽應上隂九其陽六其隂此一陽一隂期其變於純隂之數異術也其異術也七其陽八其隂九其陽六其隂此則各自乘并之以為日數案夏三月候卦氣比不至以下數節疑有錯簡春三月一卦不至一節鄭注謂似寫者得異家并存於此今以前後文義核之似不順天地以下三節亦統論卦變之效其文或在冬三月下也冬至廣莫風至蘭射干生麋角解曷旦不鳴四者羣物氣至之應也晷長丈三尺隂氣去陽雲出其莖末如樹木之狀二者天氣應政之徴也晷者所立八尺之表長丈三尺長之極後有減矣陽始也起故隂氣去於天不復見而陽雲出箕焉二十四氣冬至芒種為陽其位在天漢之南夏至大雪為隂其位在天漢之北術候陽雲於陽位而以夜候隂雲於隂位而以晝夜則司之於星晝則視於其位而以其率爾雲之形貌亦如説卦之後象也冬至坎始用事而主六氣初六巽爻也巽為木如樹木之狀巽象案古微書作冬至陽雲出箕如樹木之狀注亦作陽雲出箕其字應作箕凡此隂陽之雲天之雲天之便氣也坎震離兌為之每卦六爻既通於四時二十四氣人之四支二十四脈亦存於期形猶不從五行之狀故其當至不至則萬物大旱大豆不為人足太隂脈虛多病振寒萬物藏氣大旱隂不足也未當至而至則人足太隂脈盛多病暴逆臚張心痛大旱應在夏至衝受也災期在齊案衝受句疑衍小寒合凍虎始交祭蛇垂首曷旦入空晷長丈二尺四分倉陽雲出平南倉北黑二者亦天應政之徵也晷減於冬至九寸二分者率也小寒於坎直九二九二得寅氣木也為南倉從坎也為北黑宿次當為出尾而言平似誤者也案禮記月令孔穎逹疏引作小寒虎始交豺祭獸此本疑脫豺獸二字又後漢書注小寒晷長一大一尺四分古微書作倉陽雲出氐俱與此文異當至不至則先小旱後小水人手太隂脈虛一作靈人多病喉痺隂氣不生故小旱後則并小水坎九二陽爻也為午氣不至故令脈虛喉脾字誤也當為喉痺時方隂隂閉塞人氣通人之氣氣通者喉喉病為痺手太隂脈起手大指內側上貫呪唾散鼻中未當至而至則人手太隂脈盛人多熱來年麻不為寒氣失而轉生熱病多熱麻以皮為用孚甲之類藏失必傷故禁種案前後節氣此處疑脫應在小暑句注亦脫災在周泰句大寒雪降草木多生心鵲始巢三者羣物應氣至之候隂盛也多生心陽氣起也晷長丈一尺八分黑陽雲出心南黑北黃大寒於坎直六三六三得亥氣水也為南黑季冬土也為北黃當至不至則旱後水麥不成人足少隂脈虛多病蹶逆惕善驚小寒氣不至為小旱小水大寒不至有加勢也稼合養於氣氣失即傷矣坎六三隂爻也屬足不至故令人脈虛虛則足煩氣逆本舌為病此三平在震中震為驚恐也足少隂脈起於足上繫未當至而至則人足少隂脈盛人多病上氣嗌腫嗌者水榖所由通今初未當來而來上氣嗌嗌腫受其病以少隂盛也應在大暑災期在周立春雨水降條風至雉雊雞乳冰解楊栁椲降下也雊鳴相呼也栁青楊色也椲讀如柘楊梯狀如女桑秀然也晷長丈一尺二分青陽雲出房如積水立春於坎直六四六四巽爻得木氣之雲如積水似誤案後漢書律歷志注作晷長一丈一寸六分當至不至則兵起來年麥不成人足少陽脈虛多病疫瘧立春木始王氣不至兵起者金沴之也大旱似多雷麥立春麥也春不至者陽氣出當小雨以釋之氣失故麥不成來年羡字坎六四隂爻也屬足也氣不足故令足脈虛立春不至者寒得其節也疫瘧寒赤病此當與火同為足少隂脈言陽非案後漢書注作兵起麥不成民瘦瘵與此文異未當至而至則人足少陽脈盛人多病粟疾疫粟痤腫也春氣早成麥盛而結生此病焉王氣早隂則傷之人疾疫者受其害也脈亦當為足少隂矣應在立秋災期在道案軒轅十二次自張十八度至軫十一度曰鶉尾之次立秋節斗建在申今楚分野禮記月令注髙氏誘曰孟秋之月日在翼翼南方宿楚之分野則此處宜作楚道字乃傳寫之訛也雨水凍冰釋猛風至獺祭魚鶬鷃鳴蝙蝠出猛風動搖樹木有聲倉庚鳴伏地蝙蝠服翼案馬氏繹史引作獺祭魚倉庚鳴晷長九尺一寸六分黃陽雲出亢南黃北黑雨水於坎直九五九五辰在申得坤氣為南黃猶坎也故北黑案晷長九尺一寸六分三句原本誤入注中今改正當至不至則旱麥不為人手少陽脈虛人多病心痛雨水氣不至則轉為旱旱故禁種春坎九五陽爻於脈宜為手太陽云少陽似誤心痛坎也手太陽脈起為手小指端上頥下目內皆雨水以後為陽脈者未當至而至則人手少陽脈盛人多病目雨水木氣也其盛為肝肝候在目木氣於目則勞勞故病言脈亦當為於太陽也應在處暑災期在魏驚蟄雷候應北雷者電之光雷有光而未發聲案古微書作驚蟄大壯初九桃始華不華倉庫多火與此文異晷長八尺二寸赤陽雲出翼南赤北白驚蟄於坎直上六上六得已氣已火也為南赤又得巽氣故北白也當至不至則霧稚禾不為人足太陽脈虛人多疫病瘧驚蟄氣不至是餘寒乘之也後則推晷氣命稚禾之熟在八月其時蟄蟲則有害故禁種之爾坎上六隂爻屬足氣不至故命之脈虛寒氣乘病瘧寒也上六得巽之氣為白又為寡髮而自是老人也太陽脈起足小指端至前兩板齒案後漢書注作稚禾不成老人多病噎未當至而至則人足太隂脈盛多病癰疽脛腫雷氣蚤至動人肌膚病癰疽者肌膚不堪也氣結生病也足太陽脈起於下其氣盛合脛腫應在白露災期在災案病癰疽者四句原本誤入正文應在白露句原本誤作小注今改正又災期在災災字誤考軒轅十二次自軫十二度至氐四度謂之夀星之次白露節斗建在酉今韓鄭分野禮記月令注髙氏誘曰仲秋之月日在角角東方宿鄭之分野則此處疑當作鄭春分明庶風至雷雨行桃始花日月同道明庶照逹庶物之風雷雨所以解釋孚甲日月一分則同道也案藝文類聚引作雷雨行桃李華太平御覽引作春分明庶風至正封疆修田疇與此文異晷長七尺二寸四分正陽雲出張如積鵠春分於震直初九初九辰在子震爻也如積鵠之象案杜公瞻編珠引作春分雲如白鵠古微書引作正陽雲出如積白鵠此本疑脫白字當至不至先旱後水歲惡重來不為人手太陽脈虛人多病痺痛未當至而至人手太陽脈盛人多病癘疥身癢應在秋分災期周秦案後漢書注作先旱後水歲惡米不成多病耳癢重來二字恐誤清明雷鳴雨下清明風至元鳥來清明萬物雜新解孚甲合之鮮解清明明清潔之風也元鳥隨氣和乃至案注文疑有訛誤晷長六尺二寸八分白陽雲出南白北黃清明震直六二六二震在酉得兌氣為南白互體有艮故北黃也當至不至菽豆不為人足陽明脈虛人多病疥虛振寒洞泄震於稼為反生豆菽之類案後漢書注作多病嚏振寒洞泄未當至而至人足陽明脈盛人多病溫暴死應在寒露災在宋也案前後節氣此句宜應在寒露白露恐誤今改正榖雨田鼠化為鴽鴽麋母也晷長五尺三寸二分太陽雲出張上如車蓋不如薄榖雨於震直六三六三辰在辰得乾氣形似車蓋震為萑葦故不如薄也案後漢書注引作榖雨晷長五尺三寸六分杜公瞻編珠作穀雨雲如連蓋與此文異當至不至水物稻等不為人足陽明脈虛人多病癰疽瘧振寒霍亂六三兊爻也互體坎氣不至故水澤之物不為癰疽瘧振寒霍亂亦姤兊之病未當至而至人足陽明脈盛人多病溫黑腫凡陽以養少隂以養老應在霜降災期在宋立夏清明風至而暑鵠聲蜚電見早出龍升天清明風景清潔之風鵠鳴聲蜚皆鳥獸應時候龍心星也詩云綢繆東薪三星在天亦謂此時也案徐堅初學記引作立夏清風至而暑鵲鳴聲博榖飛電見龍升天太平御覽引作立夏清明風至出幣帛禮諸侯與此文異晷長四尺三寸六分當陽雲出觜紫赤如珠立春於震九四九四辰在午也午為火互體坎氣相亂也故紫赤色皆如珠也當至不至則旱五榖大傷牛畜病人手陽明脈虛多病寒熱齒齲盛陽之氣不至則後為旱陽氣乘之故五榖大傷也四互體艮艮在丑故牛畜病也陽氣不至其衝更溫故人病寒熱也齒齲者陽生齲於時為害也未當至而至人手陽明脈盛多病頭腫嗌喉痺應在立冬災期在燕小滿雀子蜚螻蛄鳴於此更言雀子蜚者鳴鳥類也有先大人之案此注疑有脫文晷長三尺四寸上陽霍七星赤而饒小滿於震直六五六五辰在邜與震木同位震木可曲可直五六離爻亦有互體坎之為輪也饒言其刑行四也案古微書小滿上陽雲出七星霍字疑誤注文末句亦誤當至不至多凶言有大喪先水後旱人足太陽脈虛人多病滿筋急痺痛小滿太陽用事其氣不至故多凶言大喪也隂氣不退乘陽氣故先水也精陽發則旱也人病筋急寒暴暑氣轉相加案後漢書注作多病筋急庳痛滿字疑誤未當至而至人足太陽脈盛人多病衝氣腫太陽氣早至過度為病也案此處疑脫應在小雪句注亦脫災期在燕句芒種蚯蚓出舊説蚯蚓淫邪晷長二尺四分長陽雲集赤如曼曼芒種於震直上六上六辰在已又得巽氣故集赤不純巽又長故曼之也案後漢書注作晷長二尺四寸四分此本缺四寸二字當至不至多凶言國有狂令人足太陽脈虛多病血痺太陽用事而巽不至故多凶言國有狂令也痺者氣不逹為病未當至而至人足太陽脈盛多蹶眩頭痛痺太陽之氣也過盛病也案後漢書注頭痛下無庳字疑衍文應在大雪災期在齊案軒轅十二次自斗十一度至須女七度日星紀之次大雪節斗建在子今吳越分野齊字恐悮夏至景風至暑且濕蟬鳴螳螂生鹿解角木莖榮景風長大萬物之風也蟬蜩木莖栁櫬榮華案太平御覽引作夏至景風至拜大將封有功與此文異注文亦有訛字晷長四寸八分少隂雲出如水波崇崇夏至離用事位直初九辰子也故水波崇崇微輪轉出也案後漢書注夏至晷長一尺四寸八分此文缺一尺二字當至不至邦有大殃隂陽並傷口乾嗌痛陽氣泄極而微隂不至陽功不成故國有大殃臣廢隂陽並傷日月俱食夏至氣不至則衝氣乘之故多大寒令草木夏落也口乾嗌痛皆慘病隂不潤陽謂之慘也案後漢書注當至不至國有大殃旱隂陽並傷草木夏落有大寒今據鄭注合之此文脫誤多矣又疑脫人手陽脈虛句未當至而至人手陽脈盛多病肩痛隂氣過多以為病也應在冬至災期在齊小暑雲五色出伯勞鳴蝦蟇無聲雲五色出蓋衆雉伯勞咀也蝦蟇無聲早出者不復鳴案禮記月令孔頴達疏引此文作博勞鳴蝦蟇無聲歐陽詢藝文類聚引此文又有博勞性好單按其飛􅭙其聲嗅嗅夏至應隂而鳴冬至而止五句疑為注文藝文類聚誤連而今本亦有脫誤也晷長二尺四寸四分黑隂雲出南黃北黑小暑於離直六二六二離爻也為南黃互體巽巽為故北黑也案此注巽為下有脫字當至不至前小水後小旱有兵人足陽明脈虛多病泄注腹痛離氣不至故小水後小旱有少兵兵無少者泄注腹痛皆離氣不至之病也未當至而至人足陽明脈盛多病臚腫離氣早至則後多傷性也應在小寒災期在齊案此處宜應在小寒小雪誤今改正大暑雨濕半夏生半夏草名晷長三尺四寸隂雲出南赤北倉大暑於離直九三九三辰在辰得巽氣離為火故南赤巽木故北倉案杜公瞻編珠引作大暑雲出南黃北倉當至不至外兵作來年飢人手少陽脈虛多病筋痺胸痛大暑之氣不至後亦寒暴害九三互體兊上直畢畢為故外兵作也兊又為剛鹵當國不生物大暑應在大寒容地之萌故來年飢筋痺暑濕之疾盛暑濕而氣不至於人主筋痺之病也案注畢為下有脫字容地句亦疑誤未當至而至人手少陽脈盛多病脛痛惡氣隂氣早至亦為此病應在大寒災期在燕立秋涼風至白露下虎嘯腐草為嗌蜻蚓鳴涼風風有寒氣白露露得寒氣始轉白虎嘯始盛秋氣有猛意舊説腐草為鳴今言嗌其物異名乎蜻蚓蟋蟀之名也案太平御覽引作立秋涼風至報土功祀四鄰又文選李善注引作立秋蜻蛚鳴蚓字應作蛚晷長四尺三寸六分濁隂雲出上如赤繒列下黃弊立秋於離直九四辰在午又互體巽故上如赤繒列齊平也立秋直坤黃色故名黃弊也案弊字疑作幣當至不至暴風為災年歲不入人足少陽脈虛多病癘少陽氣中寒白芒芒立秋之氣不至後亦暴風為災也四互體巽巽為風災也風有散物故年不入也立秋應立春孚甲將解而更寒故人病癘隂乘陽故少陽氣中寒也白芒芒者離以非時見也人足者例宜言手未當至而至人足少陽脈盛多病咳嗽上氣咽喉腫立秋則隂氣脅陽氣未服故咳嗽咽喉腫也應在立春災期亦在衛也處暑雨水寒蟬鳴雨水多雨寒蟬秋蟬晷長五尺三寸二分赤隂雲出南黃北黑處暑於離直六五六五辰在卯得震氣震為故南黃也案初學記作南黃北蒼注震為下亦有脫字當至不至國有淫令四方兵起人手太隂脈虛多病脹身熱來年麥不為未當至而至人手太隂脈盛多病脹身熱不汗出隂氣早至即寒氣盛故病脹身熱不汗案後漢書注當至不至國多浮令兵起來年麥不熟此文疑倒置應在雨水災期在鄭白露雲氣五色蜻蛚上堂鷹祭鳥燕子去室鳥雌雄别燕子去室不復在於巢習飛騰也鳥雌雄别生乳之氣上者晷長六尺二寸八分黃隂雲出南黑北黃白露於離直上九上九艮爻也故北黃辰在戌得乾氣君成故南黑也案小注君成二字疑誤當至不至六畜多傷人足太隂脈虛人多病痤疽泄白露應在驚蟄陽氣大泄萬物新出而寒傷之故座疽也陽氣發泄故也故泄之未當至而至人足太隂脈盛多病心脹閉痔瘕陽氣未盡強隂脅之為病人足於例亦為手也應在驚蟄災在魯也秋分風涼慘雷始收鷙鳥擊元鳥歸昌盍風至收藏也鷙鳥鷹鸇之屬也元鳥隨陽故南歸也昌盍蓋藏物之風也案太平御覽引作秋分閶闔風至解懸垂琴瑟不張與此文異晷長七尺二寸四分白雲出南黃北白秋分於兊直初九初九震爻為南黃黃猶兊故北白案古微書白陽雲作白隂雲當至不至草木復榮人手少陽脈虛多病溫悲心痛未當至而至人手少陽脈盛多病􅽫脅鬲痛心氣盛故􅽫脅鬲痛應在春分災期在周寒露霜小下秋草死衆鳥去霜小下隂微著也秋草死衆鳥暑來寒去晷長八尺二寸正陽雲出如冠纓寒露於兊直九二九二辰在寅得艮氣形似冠纓者艮象也案古微書作正隂雲出如冠纓鄭注亦作冠纓正文脫纓字今補入當至不至來年榖不成六畜鳥獸被殃人足蹶隂脈虛多病疪疼腰痛九二坎爻也為脊氣不至疪疼也人足於例宜為手也案後漢書注作人病疝瘕腰痛不當至而至人足蹶隂脈盛多病痛􅽫中熱強隂脅衰故多病􅽫中熱也案後漢書注作多病痰熱中應在清明災在秦也霜降候雁南向豺祭獸霜大下草未死候雁南向陽氣盡之候也豺將食獸必先祭也草禾或為草木晷長九尺一寸六分太陽雲出上如羊下如磻石霜降於兊直六三六三兊爻為羊又上直礪石之星故上如羊下如磻石案初學記作太隂雲出當至不至萬物大耗來年多大風人足蹶隂脈虛多病腰痛霜降氣不至則陽氣不伏當死更生故令物虛耗六又互體巽則暴發來年即為大風也又撓屈萬物故令人患其腰痛也未當至而至人足蹶隂脈盛多病喉風腫隂氣早至而脅陽也又互體離離巽火得風腫案後漢書注作多病胃脅支滿應在榖雨災期在趙立冬不周風至始冰薺麥生賔爵入水為蛤立冬應用事陽氣生異故不周風至周達萬物之不及時者時草死盡惟薺麥生耳賔爵入水為蛤亦物應時之變候晷長丈一寸二分隂雲出接立冬於兊直九四九四辰在午火性炎上故接案太平御覽引作立冬不周風至修宫室完邉城八風以時則隂陽正治道成萬物得以育生與此文異當至不至地氣不藏立夏反寒早旱晚水萬物不成人手少陽脈虛多病溫心煩未當至而至人手少陽脈盛多病臂掌痛隂脈在內故氣早至為病令人掌及臂痛也應在立夏災期在魏小雪隂寒熊羆入穴雉入水為蜃雉入水亦為蜃蛤晷長丈一尺八分隂雲出而黑小雪於兊在九五九五兊爻得坎氣故黑當至不至來年五榖傷蠶麥不為人心主脈虛多病肘腋痛未當至而至人心主脈盛人多病腹耳痛九五坎爻故耳病也辰在申氣得故腹痛案此注疑有脫誤應在小滿災期在魯大雪魚負冰雨雪負冰上近冰也雨雪者明不復雨水晷長丈二尺四分長雲出黑如介大雪於兊直上六上六辰在已得巽氣為長始分或如介未聞案古微書作隂雲出而分當至不至溫氣泄夏蝗生大水人手心主脈虛多病少氣五疸水腫未當至而至人手心主脈盛多病癰疽腫痛盛陽之氣早至結則為癰疽冬萬物孚甲氣早至故多疽而痛應在芒種災期在衛聖人仰取象於天俯取法於地以知隂陽精微所應精微晷及雲氣也應者應人君政之進退故日者衆陽之精也天所以照四方因以立定二十四氣始於冬至終於大雪周天三百六十五日分之一隂一陽分之各得八十二日有竒分為普得九十一日有竒四正分而成八節節四十五日二十一分八節各三分各得十五日七分而為一氣也分滿三十二為一日令備或為復言隂陽四時八節二十四氣各如其分之日數令備為一嵗備足也復備同義説者以為疑字耳言備或為復人自以為法度焉二十四氣其復合於晷應其法皆先復之二日左同右
